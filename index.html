<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOBÊ — DJ & Producer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C8A84B;
            --gold-light: #E8C96A;
            --gold-dim: rgba(200,168,75,0.15);
            --gold-border: rgba(200,168,75,0.3);
            --black: #050505;
            --dark: #0D0D0D;
            --surface: #111111;
            --surface2: #161616;
            --text: #E8E4DC;
            --text-muted: #7A7670;
            --text-dim: #4A4744;
            --white: #F5F1EA;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            color: var(--text);
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 128px;
            pointer-events: none;
            z-index: 9999;
        }

        /* CUSTOM CURSOR */
        .cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s;
            transform: translate(-50%, -50%);
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 48px;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 6px;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            padding-top: 100px;
        }

        .hero-content {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-image {
            flex: 1;
            position: relative;
            background: var(--surface);
            overflow: hidden;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1);
        }

        /* --- MOBILE ADJUSTMENTS (THE FIX) --- */
        @media (max-width: 900px) {
            nav { padding: 20px 24px; }
            .nav-links { display: none; } /* Opcional: esconde menu no mobile */

            .hero {
                flex-direction: column; /* Stacks text on top, photo on bottom */
                height: auto;
            }

            .hero-content {
                padding: 40px 24px;
                order: 1;
            }

            .hero-image {
                height: 500px; /* Gives the photo a fixed height on mobile */
                order: 2;
                width: 100%;
            }

            .hero-image img {
                height: 100%;
                width: 100%;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursorDot"></div>

    <nav>
        <a href="#" class="nav-logo">DOBÊ</a>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#music">Music</a></li>
            <li><a href="#sets">Sets</a></li>
            <li><a href="#booking">Booking</a></li>
        </ul>
    </nav>

    <section class="hero" id="about">
        <div class="hero-content">
            <h1 style="font-family: 'Bebas Neue'; font-size: clamp(60px, 8vw, 120px); line-height: 0.9; margin-bottom: 40px;">
                SOUND<br>SINCE<br>2016
            </h1>
            <p style="max-width: 500px; color: var(--text-muted); line-height: 1.6; margin-bottom: 32px;">
                DOBÊ is an electronic music producer and DJ whose sonic identity has been forged through years of experimentation, club culture and deep sound research.
            </p>
            </div>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80" alt="DOBÊ">
            <div style="position: absolute; bottom: 40px; right: 0; background: var(--gold); color: var(--black); padding: 12px 24px; font-family: 'Bebas Neue'; letter-spacing: 4px;">DOBÊ</div>
        </div>
    </section>

    <script>
        const dot = document.getElementById('cursorDot');
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
